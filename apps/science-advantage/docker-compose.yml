services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: science-advantage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: science_advantage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
volumes:
  postgres_data:
    driver: local
