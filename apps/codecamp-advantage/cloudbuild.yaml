steps:
  - name: "gcr.io/cloud-builders/docker"
    id: "build-image"
    args:
      - "build"
      - "-f"
      - "apps/codecamp-advantage/Dockerfile"
      - "-t"
      - "asia-southeast1-docker.pkg.dev/$PROJECT_ID/codecamp/codecamp-advantage:$BUILD_ID"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    id: "push-image"
    args:
      - "push"
      - "asia-southeast1-docker.pkg.dev/$PROJECT_ID/codecamp/codecamp-advantage:$BUILD_ID"

  - name: "gcr.io/cloud-builders/gcloud"
    id: "deploy-cloudrun"
    args:
      - "run"
      - "deploy"
      - "codecamp-advantage"
      - "--image=asia-southeast1-docker.pkg.dev/$PROJECT_ID/codecamp/codecamp-advantage:$BUILD_ID"
      - "--region=asia-southeast1"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--service-account=codecamp-cloud-run@$PROJECT_ID.iam.gserviceaccount.com"
      - "--add-cloudsql-instances=reading-advantage:asia-southeast1:cloud-sql"
      - "--set-env-vars=NODE_ENV=production,NEXT_PUBLIC_API_URL=https://codecamp.reading-advantage.com"
      - "--set-secrets=DATABASE_URL=DATABASE_URL:latest,AUTH_SECRET=AUTH_SECRET:latest,GITHUB_APP_ID=GITHUB_APP_ID:latest,GITHUB_PRIVATE_KEY=GITHUB_PRIVATE_KEY:latest,GITHUB_WEBHOOK_SECRET=GITHUB_WEBHOOK_SECRET:latest,GITHUB_INSTALLATION_ID=GITHUB_INSTALLATION_ID:latest,OPENROUTER_API_KEY=OPENROUTER_API_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,GOOGLE_AI_API_KEY=GOOGLE_AI_API_KEY:latest"

  - name: "gcr.io/cloud-builders/gcloud"
    id: "allow-public-invoker"
    args:
      - "run"
      - "services"
      - "add-iam-policy-binding"
      - "codecamp-advantage"
      - "--region=asia-southeast1"
      - "--member=allUsers"
      - "--role=roles/run.invoker"

images:
  - "asia-southeast1-docker.pkg.dev/$PROJECT_ID/codecamp/codecamp-advantage:$BUILD_ID"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
